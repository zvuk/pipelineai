version: 1

agent:
  name: pai-docs
  model: '{{ env "LLM_MODEL" "openai/gpt-oss-20b" }}'
  artifact_dir: .agent/artifacts
  openai:
    base_url: '{{ env "LLM_BASE_URL" "http://localhost:1234/v1" }}'
    api_key_env: LLM_API_KEY

defaults:
  scenario_timeout: 120m
  step_timeout: 30m
  tool_timeout: 120s

approvers:
  - tool: apply_patch
    rules:
      - glob_patterns: [".agent/artifacts/items/**/doc.md", "README.md"]
        allow_create: true
        allow_update: true
        allow_delete: true

steps:
  # 2) Обзор проекта
  - id: gen_overview
    type: llm
    tools_allowed: ["shell"]
    user_prompt: |
      Общая задача: генерация и обновление документации сервиса в README.md. Задача разбита на независимые шаги, каждый из которых собирает контекст самостоятельно и пишет свой раздел документации на русском языке в Markdown.
      Контекст задачи:
      - Ты запущен в CI для автоматического создания/обновления документации сервиса.
      - Общая цель: подготовить/актуализировать README.md с разделами Overview/Quickstart/Config/API/Architecture/Make/Storage/Infra.
      - Каждый шаг независим, не знает про другие шаги. Сам собери контекст только командами shell (ls/tree/rg/jq/cat и т.п.) и опирайся исключительно на найденные файлы.
      - При анализе также прочти текущую редактцию README.md, если он есть, чтобы не дублировать информацию.
      - Финальный текст текущего раздела верни в последнем сообщении на русском языке — агент сам сохранит его в артефакт. Если подтверждённых данных нет, верни ровно `SKIP`.
      
      Текущее задание:
      - Собери контекст командами shell (списки файлов, ключевые директории, точки входа).
      - Сформируй раздел "Обзор" (overview) для README на русском языке. Кратко объясни назначение сервиса и ключевые компоненты (10‑15 строк, можно маркеры).
      - В ответе для оформления используй Markdown и эмодзи. Язык — русский.
      - В документации не следует писать в стиле `такие-то данные не найдены`, в случаях когда по секции ничего нет — просто верни `SKIP`, а если нет какой-то части информации — не упоминай её.
    outputs:
      - id: doc
        type: file
        from: llm_text
        path: "{{ .agent.artifact_dir }}/items/overview/doc.md"

  # 3) Быстрый старт
  - id: gen_quickstart
    type: llm
    tools_allowed: ["shell"]
    user_prompt: |
      Общая задача: генерация и обновление документации сервиса в README.md. Задача разбита на независимые шаги, каждый из которых собирает контекст самостоятельно и пишет свой раздел документации на русском языке в Markdown.
      Контекст задачи:
      - Ты запущен в CI для автоматического создания/обновления документации сервиса.
      - Общая цель: подготовить/актуализировать README.md с разделами Overview/Quickstart/Config/API/Architecture/Make/Storage/Infra.
      - Каждый шаг независим, не знает про другие шаги. Собирай факты исключительно командами shell (читай Makefile, docker-compose, README, docs и т.п.) и включай в текст только подтверждённые команды/цели.
      - При анализе также прочти текущую редактцию README.md, если он есть, чтобы не дублировать информацию.
      - Итоговый Markdown‑раздел верни в ответе на русском языке агент сохранит его автоматически. Если данных нет — верни `SKIP`.
      
      Текущее задание:
      - Собери контекст (цели Makefile, наличие Dockerfile/compose, способы запуска в режиме разработки и способы деплоймента (HELM-чарты)) командами shell. Используй только реально найденные цели/команды.
      - Сформируй раздел "Быстрый старт" (quickstart): команды сборки/запуска (make/docker/compose), пример запуска локально и деплоймента.
      - В ответе используй Markdown и эмодзи. Язык — русский.
      - В документации не следует писать в стиле `такие-то данные не найдены`, в случаях когда по секции ничего нет — просто верни `SKIP`, а если нет какой-то части информации — не упоминай её.
    outputs:
      - id: doc
        type: file
        from: llm_text
        path: "{{ .agent.artifact_dir }}/items/quickstart/doc.md"

  # 4) Конфигурация и ENV
  - id: gen_config
    type: llm
    tools_allowed: ["shell"]
    user_prompt: |
      Общая задача: генерация и обновление документации сервиса в README.md. Задача разбита на независимые шаги, каждый из которых собирает контекст самостоятельно и пишет свой раздел документации на русском языке в Markdown.
      Контекст задачи:
      - Ты запущен в CI для автоматического создания/обновления документации сервиса.
      - Общая цель: подготовить/актуализировать README.md с разделами Overview/Quickstart/Config/API/Architecture/Make/Storage/Infra.
      - Собирай только подтверждённые факты: считывай `.tpl.env`, `internal/configuration`, `deployments/**`, README, Makefile, а для Python-проектов — `settings.py` и `config.py`.
      - При анализе также прочти текущую редактцию README.md, если он есть, чтобы не дублировать информацию.
      - Итоговый Markdown верни в ответном сообщении на русском языке (агент сохранит его автоматически). Если данных нет — верни `SKIP`.
      
      Текущее задание:
      - Собери контекст командами shell (rg/cat/ls/tree и т.п.).
      - Сформируй раздел "Конфигурация" (config): перечисли важные ENV и конфиги (поиск в .tpl.env/internal/**/deployments/**/settings.py и т.п.), их назначение и значения по умолчанию.
      - Если данных мало — приведи только найденные. Если данных нет — верни `SKIP`.
      - В ответе используй Markdown и эмодзи. Язык — русский.
      - В документации не следует писать в стиле `такие-то данные не найдены`, в случаях когда по секции ничего нет — просто верни `SKIP`, а если нет какой-то части информации — не упоминай её.
    outputs:
      - id: doc
        type: file
        from: llm_text
        path: "{{ .agent.artifact_dir }}/items/config/doc.md"

  # 5) API
  - id: gen_api
    type: llm
    tools_allowed: ["shell"]
    user_prompt: |
      Общая задача: генерация и обновление документации сервиса в README.md. Каждый шаг автономен.
      Контекст задачи:
      - Ты запущен в CI для автоматического создания/обновления документации сервиса.
      - Общая цель: подготовить/актуализировать README.md с разделами Overview/Quickstart/Config/API/Architecture/Make/Storage/Infra.
      - Используй только shell, чтобы перечислить REST/GraphQL/прочие API (router, OpenAPI, gql схемы, docs). Для каждой ручки указывай источник файла/пути. Если находишь сгенерированный файл (в папках **/generated/**), то ищи и хендлер/резолвер и ссылайся на него.
      - Для Python‑проектов ищи Flask/FastAPI/Django‑REST‑Framework и связанные роутеры, сериализаторы и вьюхи.
      - При анализе также прочти текущую редактцию README.md, если он есть, чтобы не дублировать информацию.
      - Итоговый Markdown верни в ответном сообщении на русском языке (агент сохранит его автоматически). Если данных нет — верни `SKIP`.
      
      Текущее задание:
      - Поиск выполняй командами оболочки (rg по роутерам, анализ *.gql, *.yaml). Также ищи хендлеры/резолверы в коде.
      - Сформируй раздел "API" (api) на русском языке. Перечисли ВСЕ найденные REST‑ручки и GraphQL операции.
      - Не выдумывай — выводи только подтверждённое файлами. Если данных нет — верни `SKIP`.
      - В ответе используй Markdown и эмодзи. Язык — русский.
      - В документации не следует писать в стиле `такие-то данные не найдены`, в случаях когда по секции ничего нет — просто верни `SKIP`, а если нет какой-то части информации — не упоминай её.
    outputs:
      - id: doc
        type: file
        from: llm_text
        path: "{{ .agent.artifact_dir }}/items/api/doc.md"

  # 6) Архитектура
  - id: gen_architecture
    type: llm
    tools_allowed: ["shell"]
    user_prompt: |
      Общая задача: генерация и обновление документации сервиса в README.md.
      Контекст задачи:
      - Ты запущен в CI для автоматического создания/обновления документации сервиса.
      - Общая цель: подготовить/актуализировать README.md с разделами Overview/Quickstart/Config/API/Architecture/Make/Storage/Infra.
      - Описывай только реально существующие пакеты/директории и зависимости: подтверждай их выводами ls/tree/rg.
      - Финальный Markdown-блок с разделом "Архитектура" верни в ответе на русском языке — агент сохранит его автоматически. Если данных нет — верни `SKIP`.
      
      Текущее задание:
      - Собери контекст командами shell (ls/tree/rg и т.п.).
      - Сформируй раздел "Архитектура" (architecture): основные слои/пакеты и их ответственность; точки входа и важные зависимости. Сервисный слой, бизнес-логика, работа с данными, внешние интеграции.
      - До 40‑50 строк, по делу. При необходимости собери сводку файлов командами оболочки.
      - В ответе используй Markdown и эмодзи. Язык — русский.
      - При анализе также прочти текущую редактцию README.md, если он есть, чтобы не дублировать информацию.
      - В документации не следует писать в стиле `такие-то данные не найдены`, в случаях когда по секции ничего нет — просто верни `SKIP`, а если нет какой-то части информации — не упоминай её.
    outputs:
      - id: doc
        type: file
        from: llm_text
        path: "{{ .agent.artifact_dir }}/items/architecture/doc.md"

  # 7) Makefile раздел
  - id: gen_make
    type: llm
    tools_allowed: ["shell"]
    user_prompt: |
      Общая задача: генерация и обновление документации сервиса в README.md.
      Контекст задачи:
      - Ты запущен в CI для автоматического создания/обновления документации сервиса.
      - Общая цель: подготовить/актуализировать README.md с разделами Overview/Quickstart/Config/API/Architecture/Make/Storage/Infra.
      - Перечисляй только реально существующие цели Makefile: считывай файл через shell (rg/grep/cat) и описывай назначение на основе комментариев/текста.
      - Верни итоговый Markdown-раздел в ответе на русском языке (агент сохранит его автоматически). Если Makefile отсутствует или целей нет — верни `SKIP`.
      
      Текущее задание:
      - Считай Makefile командами оболочки.
      - Сформируй раздел "Makefile и задачи" (make): краткая сводка ключевых целей и их назначения, рекомендации по использованию.
      - В ответе используй Markdown и эмодзи. Язык — русский.
      - При анализе также прочти текущую редактцию README.md, если он есть, чтобы не дублировать информацию.
      - В документации не следует писать в стиле `такие-то данные не найдены`, в случаях когда по секции ничего нет — просто верни `SKIP`, а если нет какой-то части информации — не упоминай её.
    outputs:
      - id: doc
        type: file
        from: llm_text
        path: "{{ .agent.artifact_dir }}/items/make/doc.md"

  # 8) Хранилище данных (БД)
  - id: gen_storage
    type: llm
    tools_allowed: ["shell"]
    user_prompt: |
      Общая задача: генерация и обновление документации сервиса в README.md.
      Контекст задачи:
      - Ты запущен в CI для автоматического создания/обновления документации сервиса.
      - Общая цель: подготовить/актуализировать README.md с разделами Overview/Quickstart/Config/API/Architecture/Make/Storage/Infra.
      - Собирай факты только через shell: сканируй драйверы (pgx/sqlx и т.п.), ENV, миграции, SQL-запросы (`internal/**/sql/*.sql`, `repository/**`, `pkg/**/sql`, `db/migrations`, а для Python-проектов — `alembic/versions` и `migrations/`). ). Для каждого факта указывай путь к файлу/директории.
      - При анализе также прочти текущую редактцию README.md, если он есть, чтобы не дублировать информацию.
      - Верни итоговый Markdown-блок в ответе на русском языке — агент сохранит его автоматически. Если БД не используется — верни `SKIP`.
      
      Текущее задание:
      - Найди использование БД. Если есть — чётко укажи: тип БД, параметры/ENV, список таблиц/схем (по *.sql и коду), директории миграций/скриптов.
      - Поиск выполняй командами оболочки:
        - Клиенты/драйверы: `rg -nE 'postgres|pgx|database/sql|gorm|sql.Open|sqlx|DSN|PG(DB|URI)' -S || true`
        - Миграции/скрипты: проверь каталоги migrations/, db/migrations/, cmd/**/migrations/ и т.п., собери список *.sql; из них вытащи имена таблиц по CREATE/ALTER.
        - ORM: `rg -nE 'AutoMigrate|TableName\(\)' -g '**/*.go' || true`
        - ENV: `rg -nEi 'DSN|DATABASE_URL|POSTGRES_\w+' -g '**/*' || true`
        - SQL-запросы в коде: `rg -nE 'SELECT .* FROM|INSERT INTO|UPDATE .* SET' -g '**/*.go' || true`
        - sqlalchemy для Python-проектов: `rg -nE 'create_engine|sessionmaker|alembic|create_table' -g '**/*.py' || true`, tables.py и модели.
        - Если миграций нет, перечисли найденные каталоги с SQL-запросами и таблицы, которые из них читаются (SELECT/INSERT/UPDATE, а для Python-проектов — модели SQLAlchemy).
      - В финальном тексте обязательно перечисли тип БД, параметры подключения, найденные директории с SQL/миграциями и список таблиц/представлений, к которым есть обращения, в т.ч. тип обращений (SELECT/INSERT/UPDATE).
      - В ответе используй Markdown и эмодзи. Язык — русский.
      - В документации не следует писать в стиле `такие-то данные не найдены`, в случаях когда по секции ничего нет — просто верни `SKIP`, а если нет какой-то части информации — не упоминай её.
    outputs:
      - id: doc
        type: file
        from: llm_text
        path: "{{ .agent.artifact_dir }}/items/storage/doc.md"

  # 9) Кеши и очереди (Redis/Kafka)
  - id: gen_caches_queues
    type: llm
    tools_allowed: ["shell"]
    user_prompt: |
      Общая задача: генерация и обновление документации сервиса в README.md.
      Контекст задачи:
      - Ты запущен в CI для автоматического создания/обновления документации сервиса.
      - Общая цель: подготовить/актуализировать README.md с разделами Overview/Quickstart/Config/API/Architecture/Make/Storage/Infra.
      - Собирай факты о кешах и брокерах только через shell: ищи упоминания Redis/KeyValue, Kafka, ENV и конфиги deployments.
      - При анализе также прочти текущую редактцию README.md, если он есть, чтобы не дублировать информацию.
      - Итоговый Markdown верни в ответе на русском языке — агент сохранит его автоматически. Если кеши и очереди не используются — верни `SKIP`.
      
      Текущее задание:
      - Ищи агрессивно командами оболочки (например, `rg -nEi 'redis|NewClient|HSET'`, `rg -nEi 'kafka|sarama|topic'`, анализируй deployments/* и ENV).
      - Определи использование кешей и очередей: Redis (ключи/префиксы), Kafka (топики, продюсеры/консьюмеры), иные брокеры.
      - Не выдумывай — приводи только найденные факты.
      - В ответе используй Markdown и эмодзи. Язык — русский.
      - В документации не следует писать в стиле `такие-то данные не найдены`, в случаях когда по секции ничего нет — просто верни `SKIP`, а если нет какой-то части информации — не упоминай её.
    outputs:
      - id: doc
        type: file
        from: llm_text
        path: "{{ .agent.artifact_dir }}/items/infra/doc.md"

  # 10) Сборка и применение изменений в README (только правка файла)
  - id: assemble_and_patch_readme
    type: llm
    needs: [gen_overview, gen_quickstart, gen_config, gen_api, gen_architecture, gen_make, gen_storage, gen_caches_queues]
    outputs:
      - id: summary
        type: log
        from: llm_text
    tools_allowed: ["shell", "apply_patch"]
    user_prompt: |
      Общая задача: генерация и обновление документации сервиса в ./README.md. Задача разбита на независимые шаги; ты исполняешь финальный агрегатор.
      Контекст задачи:
      - Ты запущен в CI для автоматического создания/обновления документации сервиса.
      - Общая цель: поддерживать ./README.md с разделами Overview/Quickstart/Config/API/Architecture/Make/Storage/Infra.
      - Доступ к каждому сгенерированному разделу есть через файлы (читай их полностью инструментом shell):
        * Overview:      .agent/artifacts/items/overview/doc.md
        * Quickstart:    .agent/artifacts/items/quickstart/doc.md
        * Config:        .agent/artifacts/items/config/doc.md
        * API:           .agent/artifacts/items/api/doc.md
        * Architecture:  .agent/artifacts/items/architecture/doc.md
        * Make:          .agent/artifacts/items/make/doc.md
        * Storage:       .agent/artifacts/items/storage/doc.md
        * Infra:         .agent/artifacts/items/infra/doc.md

      ОБЯЗАТЕЛЬНЫЙ АЛГОРИТМ:
      1. Обрабатывай секции строго в порядке: overview, quickstart, config, api, architecture, make, storage, infra.
      2. Для каждой секции:
         - Прочитай файл с описанием раздела (например, `cat .agent/artifacts/items/overview/doc.md` для раздела Overview) и зафиксируй, содержит ли он строку `SKIP`.
         - Прочти текущую редакцию README.md (найди через поиск).
         - Если содержимое == `SKIP` и блок в README.md отсутствует — переходи к следующему разделу.
         - Если содержимое == `SKIP`, но блок в README.md есть — удали его **через инструмент apply_patch** и сразу проверь diff: `git diff -- README.md`.
         - Если содержимое != `SKIP`:
             • Если блок в README.md отсутствует — вставь новый блок (вставка перед следующей секцией) **через инструмент apply_patch**.
             • Если блок есть и отличается — замени блок **через инструмент apply_patch**.
         - После каждого использования инструмента apply_patch обязательно проверяй `git diff -- README.md`. Если diff пуст/патч не применился — повторяй попытку (до 10 раз), при этом каждый раз меняй стратегию чтобы добиться положительного результата. При повторных провалах заверши шаг `shell: exit 1`.
         - каждую секцию оборачивай в блок комментариев Markdown:
           ```markdown
           <!-- START <SECTION_NAME> -->
           ...содержимое раздела...
           <!-- END <SECTION_NAME> -->
           ```
           где `<SECTION_NAME>` — имя секции в верхнем регистре (например, OVERVIEW, QUICKSTART и т.п.).
         - если в README.md был старый текст вне блоков секций, сохрани его без изменений (в начале файла) ТОЛЬКО ЕСЛИ ОН НЕ ДУБЛИРУЕТСЯ в новых секциях и имеет актуальное содержание.
      3. После обработки всех секций выведи `git status --short README.md` и последние строки файла, чтобы подтвердить изменения.
      4. Если ни один блок не потребовал обновления (ни добавления, ни удаления), явно сообщи об этом и НЕ вызывай apply_patch.

      Требования:
      - Не выдумывай тексты — используй только содержимое указанных выше файлов с описанием разделов.
      - Все изменения README.md делай только через инструмент apply_patch и вызывай для целевых блоков README.md и немедленно проверяй результат.
      - Внимательно следи за форматированием Markdown (заголовки, списки, эмодзи).
      - Если какой-то раздел пропущен (содержит `SKIP`), удали его из README, если он там есть.
      - В итоговом README сохраняй порядок разделов: Overview, Quickstart, Config, API, Architecture, Make, Storage, Infra.
      - Внимательно обрабатывай пограничные случаи: отсутствие README, отсутствие какого-то раздела, пустые файлы разделов и т.п.
      - В конечном итоге README.md должен содержать только актуальные разделы с правильным форматированием и должен соответствовать содержимому файлов разделов.
      - README.md оформляй на русском языке. Используй разметку Markdown и эмодзи.

      По окончанию работы верни в лог краткое резюме на русском языке:
        - Какие разделы были добавлены, обновлены, удалены или пропущены.
        - Какие сгенерированные файлы разделов были использованы, какие не найдены или содержали `SKIP`.
        - Полный путь к итоговому README.md и статус его изменений (из git status).
