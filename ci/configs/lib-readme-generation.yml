version: 1

agent:
  name: pai-lib-docs
  model: '{{ env "LLM_MODEL" "openai/gpt-oss-20b" }}'
  artifact_dir: .agent/artifacts
  openai:
    base_url: '{{ env "LLM_BASE_URL" "http://localhost:1234/v1" }}'
    api_key_env: LLM_API_KEY

defaults:
  scenario_timeout: 180m
  step_timeout: 45m
  tool_timeout: 180s

approvers:
  - tool: apply_patch
    rules:
      - glob_patterns: [".agent/artifacts/items/**/doc.md", ".agent/artifacts/plan/**.yaml", "README.md"]
        allow_create: true
        allow_update: true
        allow_delete: true

steps:
  # 1) Обзор репозитория библиотеки
  - id: gen_overview
    type: llm
    tools_allowed: ["shell"]
    user_prompt: |
      Общая задача: автоматическая генерация или обновление README.md для *библиотеки*.
      Ты выполняешь первый шаг — формируешь раздел "Обзор" (Overview) и собираешь базовое понимание структуры библиотеки.

      ВАЖНО:
      - Рассматривай текущий репозиторий как библиотеку (Go, Python, mix и т.п.), а не как HTTP‑сервис.
      - Собирай факты ТОЛЬКО через shell‑команды (ls/tree/rg/cat/find/jq и т.п.).
      - Обязательно прочитай текущий README.md, если он существует, чтобы не перефразировать существующий текст без добавленной ценности.
      - Не придумывай API и возможности — опирайся только на найденный код, документацию, конфиги и примеры.

      Текущее задание:
      1. С помощью shell:
         - Обойди дерево файлов (особенно каталоги вида `pkg`, `internal`, `lib`, `schema`, `v*`, `example`, `examples`, `tests`, `integration-tests`, `*_lib` и т.д.).
         - Найди основные entrypoints библиотеки: публичные пакеты/модули, главные структуры и интерфейсы, конфигурационные сущности.
         - Определи язык(и) реализации: Go, Python и т.п. (по go.mod, pyproject.toml, setup.cfg и др.).
         - Найди файлы с примерами использования (пример: `example/`, `examples/`, `*_example_test.go` и т.п.).
      2. На основе найденного сформируй раздел "Обзор" для README:
         - Кратко объясни, для чего нужна библиотека, в каких сервисах/сценариях её типично используют.
         - Кратко опиши ключевые модули/пакеты (по 1–2 предложения на модуль) и их ответственность.
         - Если в репозитории есть важные ссылки (Confluence, внешняя документация), упомяни их отдельным подпунктом, но не копируй дословно весь существующий README, а структурируй.
      3. Ответ верни в формате Markdown на русском языке.

      Правила:
      - Не пиши текст в духе "данные не найдены"; если информации действительно нет — верни ровно `SKIP`.
      - Не описывай REST/GraphQL‑ручки (эта конфигурация предназначена именно для библиотек).
      - Можно использовать эмодзи, но умеренно.
    outputs:
      - id: doc
        type: file
        from: llm_text
        path: "{{ .agent.artifact_dir }}/items/overview/doc.md"

  # 2) Генерация manifest секций README по структуре библиотеки
  - id: gen_sections_manifest
    type: llm
    tools_allowed: ["shell"]
    user_prompt: |
      Общая задача: подготовить подробную документацию библиотеки в README.md.
      Ты выполняешь шаг формирования плана — YAML‑манифеста разделов README на основе структуры репозитория.

      ВАЖНО:
      - Репозиторий — библиотека (Go/Python/etc.), а НЕ HTTP‑сервис.
      - Итоговый ответ ДОЛЖЕН быть валидным YAML без лишнего текста, строго следующей структуры:

        items:
          - id: "core-usage"
            title: "Быстрый старт и базовое использование"
            kind: "core"        # core | module | pattern | infra | testing | migration | other
            summary: "Краткое описание того, о чём раздел."
            files:
              - "relative/path/to/file_or_dir.go"
            notes: "Необязательные подсказки для LLM по этому разделу."

      Задача:
      1. С помощью shell:
         - Обойди дерево файлов и каталогов (особенное внимание: `pkg`, `internal`, `lib`, `schema`, `v*`, `example`, `examples`, `tests`, `integration-tests`, `misc`, `scripts`, `*_lib` и т.д.).
         - Определи ключевые модули/пакеты библиотеки: публичные API, адаптеры, вспомогательные пакеты, интеграции.
         - Найди примеры использования (example‑код) и тесты, которые показывают ожидаемый контракт.
      2. Сформируй список логических разделов README (items):
         - Для МАЛЕНЬКИХ библиотек достаточно 3–6 разделов (например: core-usage, configuration, modules, testing).
         - Для КРУПНЫХ библиотек сделай 8–20 разделов, группируя по подсистемам:
           * core API / базовые паттерны
           * конфигурация и инициализация
           * работа с БД/кешем/очередями (если библиотека об этом)
           * адаптеры и интеграции
           * тестирование и локальный запуск
           * миграции/обновление версий (если есть)
           * часто используемые паттерны / best practices.
         - Каждый item должен описывать *логический блок библиотеки*, а не один файл.
      3. Для каждого элемента:
         - `id` — машинно‑читаемый идентификатор (kebab-case, латиница, уникальный).
         - `title` — человекочитаемый заголовок раздела на русском.
         - `kind` — одна из категорий: core, module, pattern, infra, testing, migration, other.
         - `summary` — 1–2 предложения, что будет в этом разделе.
         - `files` — 1–10 относительных путей до директорий/файлов, которые важно учесть в разделе.
         - `notes` — любые подсказки будущему шагу (например, "опиши паттерн использования кеша rdbchv2").

      Правила:
      - НЕ добавляй в ответ ничего, кроме YAML с корнем `items: [...]`.
      - Если библиотека совсем пуста и ты не можешь выделить ни одного раздела — верни:
        items: []
    outputs:
      - id: manifest
        type: file
        from: llm_text
        path: "{{ .agent.artifact_dir }}/plan/lib-readme-sections.yaml"

  # 3) Матрица: прогон по каждому разделу README
  - id: lib_sections_matrix
    type: matrix
    needs: [gen_sections_manifest]
    matrix:
      from_yaml: "{{ .outputs.gen_sections_manifest.manifest.path }}"
      select: items
      item_id: "{{ .item.id }}"
    run:
      step: gen_section_doc

  # 4) Шаблонный LLM‑шаг: генерация текста раздела для одного элемента manifest
  - id: gen_section_doc
    type: llm
    template: true
    tools_allowed: ["shell"]
    user_prompt: |
      Общая задача: подробная документация библиотеки в README.md.
      Ты отвечаешь за ОДИН раздел README, соответствующий одному элементу из библиотеки.

      Текущий элемент библиотеки (раздел README):
      - id: {{ .matrix.item.id }}
      - title: {{ .matrix.item.title }}
      - kind: {{ .matrix.item.kind }}
      - summary: {{ .matrix.item.summary }}
      - files: {{ .matrix.item.files }}
      - notes: {{ .matrix.item.notes }}

      Инструкции:
      1. С помощью shell:
         - Пройди по путям из `files` (если они есть): `ls`, `tree`, `rg`, `cat` для соответствующих директорий и файлов.
         - При необходимости поищи дополнительные связанные файлы (например, по имени пакета/модуля).
      2. На основе найденного сформируй подробный раздел README на русском языке:
         - Объясни, за что отвечает этот модуль/подсистема/паттерн в библиотеке.
         - Перечисли основные публичные типы, функции, интерфейсы и как их использовать.
         - Приведи небольшие, но конкретные примеры кода (Go, Python и т.п. — исходя из языка библиотеки).
         - Если раздел относится к конфигурации или интеграции — покажи пример настройки и типичные ошибки.
         - Если раздел про миграции/версии — опиши, как безопасно обновляться и какие изменения ломающие.
      3. Оформи ответ в Markdown:
         - Начни с заголовка второго уровня `## {{ .matrix.item.title }}`.
         - Далее структурируй текст подзаголовками (например, "Назначение", "Основные типы и функции", "Примеры использования", "Рекомендации").

      Правила:
      - Не придумывай API — опирайся только на код и существующую документацию.
      - Если по этому разделу действительно нет содержательной информации (файлы отсутствуют или пусты) — верни ровно `SKIP`.
      - Не упоминай, что данные "не найдены" в явном виде; просто верни `SKIP`.
    outputs:
      - id: doc
        type: file
        from: llm_text
        path: "{{ .agent.artifact_dir }}/items/{{ .matrix.item_id }}/doc.md"

  # 5) Сборка и применение README.md
  - id: assemble_and_patch_readme_lib
    type: llm
    needs: [gen_overview, gen_sections_manifest, lib_sections_matrix]
    tools_allowed: ["shell", "apply_patch"]
    outputs:
      - id: summary
        type: log
        from: llm_text
    user_prompt: |
      Общая задача: собрать финальный README.md библиотеки на основе подготовленных артефактов.
      Ты выполняешь финальный агрегирующий шаг.
      ИСПОЛЬЗУЙ ИСКЛЮЧИТЕЛЬНО shell‑команды для поиска и чтения информации и инструмент apply_patch для внесения изменений в README.md

      Входные артефакты:
      - Обзор: .agent/artifacts/items/overview/doc.md
      - YAML‑манифест разделов: .agent/artifacts/plan/lib-readme-sections.yaml
      - Тексты разделов: .agent/artifacts/items/<item_id>/doc.md для каждого элемента manifest.items.

      ОБЯЗАТЕЛЬНЫЙ АЛГОРИТМ:
      1. С помощью shell:
         - Прочитай файл `.agent/artifacts/items/overview/doc.md`, если он существует.
         - Прочитай `.agent/artifacts/plan/lib-readme-sections.yaml` и распарсь items.
         - Для каждого `item.id` из manifest:
           * Рассчитай путь `.agent/artifacts/items/<item.id>/doc.md`.
           * Если файл существует — прочитай его содержимое полностью.
      2. Для каждой секции:
         - Прочитай файл с описанием раздела (например, `cat .agent/artifacts/items/<item.id>/doc.md`) и зафиксируй, содержит ли он строку `SKIP`.
         - Прочти текущую редакцию README.md (найди через поиск).
         - Если содержимое == `SKIP` и блок в README.md отсутствует — переходи к следующему разделу.
         - Если содержимое == `SKIP`, но блок в README.md есть — удали его **через инструмент apply_patch** и сразу проверь diff: `git diff -- README.md`.
         - Если содержимое != `SKIP`:
             • Если блок в README.md отсутствует — вставь новый блок (вставка перед следующей секцией) **через инструмент apply_patch**.
             • Если блок есть и отличается — замени блок **через инструмент apply_patch**.
         - После каждого использования инструмента apply_patch **обязательно проверяй** `git diff -- README.md`. Если diff пуст/патч не применился — повторяй попытку (до 10 раз), при этом каждый раз меняй стратегию чтобы добиться положительного результата. При повторных провалах заверши шаг `shell: exit 1`.
         - каждую секцию оборачивай в блок комментариев Markdown:
           ```markdown
           <!-- START <SECTION_NAME> -->
           ...содержимое раздела...
           <!-- END <SECTION_NAME> -->
           ```
           где `<SECTION_NAME>` — имя секции в верхнем регистре (например, OVERVIEW, QUICKSTART и т.п.).
         - если в README.md был старый текст вне блоков секций, сохрани его без изменений (в начале файла) **ТОЛЬКО ЕСЛИ ОН НЕ ДУБЛИРУЕТСЯ** в новых секциях и имеет актуальное содержание.
         - При наличии старого README.md:
           * Прочитай его целиком.
           * Если в нём есть важные ссылки или примечания, которые не дублируются в новых разделах (например, ссылки на Confluence, чеклисты, CHANGELOG) — добавь отдельный раздел в конце "Дополнительные ссылки и материалы" и аккуратно перенеси туда только релевантные элементы.
      3. После обработки всех секций выведи `git status --short README.md` и последние строки файла, чтобы подтвердить изменения.
      4. Если ни один блок не потребовал обновления (ни добавления, ни удаления), явно сообщи об этом и НЕ вызывай apply_patch.
      5. Проверь финальную версию README.md на предмет дублирующейся информации и удали её, если найдёшь через инструмент apply_patch.

      Требования:
      - Не выдумывай тексты — используй только содержимое указанных выше файлов с описанием разделов.
      - Все изменения README.md делай только через инструмент apply_patch и вызывай для целевых блоков README.md и немедленно проверяй результат.
      - Внимательно следи за форматированием Markdown (заголовки, списки, эмодзи).
      - Если какой-то раздел пропущен (содержит `SKIP`), удали его из README, если он там есть.
      - Внимательно обрабатывай пограничные случаи: отсутствие README, отсутствие какого-то раздела, пустые файлы разделов и т.п.
      - В конечном итоге README.md должен содержать только актуальные разделы с правильным форматированием и должен соответствовать содержимому файлов разделов.
      - README.md оформляй на русском языке. Используй разметку Markdown и эмодзи.
      - В конечном README.md не должно быть дублирующейся информации.

      По окончанию работы верни в лог краткое резюме на русском языке:
        - Какие разделы были добавлены, обновлены, удалены или пропущены.
        - Какие сгенерированные файлы разделов были использованы, какие не найдены или содержали `SKIP`.
        - Полный путь к итоговому README.md и статус его изменений (из git status).
