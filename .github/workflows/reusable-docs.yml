name: PAI Docs (Reusable)

on:
  workflow_call:
    inputs:
      pipelineai_ref:
        description: "Git ref (tag/branch/SHA) for PipelineAI (used for both workflow resources and go install)."
        required: false
        type: string
        default: "main"
      runner:
        description: "Runner label."
        required: false
        type: string
        default: "ubuntu-latest"
      llm_base_url:
        description: "OpenAI-compatible base URL."
        required: true
        type: string
      llm_model:
        description: "Model id."
        required: false
        type: string
        default: "openai/gpt-oss-20b"
      is_lib:
        description: "Use library README generator config."
        required: false
        type: boolean
        default: false
      create_pr:
        description: "Create a pull request with README.md changes."
        required: false
        type: boolean
        default: true
      pr_branch:
        description: "Branch name for docs PR."
        required: false
        type: string
        default: "pai/docs/readme"
      pr_title:
        description: "Title for docs PR."
        required: false
        type: string
        default: "docs: update README via PipelineAI"
      pr_body:
        description: "Body for docs PR."
        required: false
        type: string
        default: "Automated documentation update generated by PipelineAI."
    secrets:
      llm_api_key:
        description: "LLM API key (optional for local runtimes)."
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  docs:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Checkout PipelineAI Resources
        uses: actions/checkout@v4
        with:
          repository: zvuk/pipelineai
          ref: ${{ inputs.pipelineai_ref }}
          path: .pai

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: .pai/go.mod
          cache: true

      - name: Install pipelineai
        run: go install github.com/zvuk/pipelineai/cmd/pipelineai@${{ inputs.pipelineai_ref }}

      - name: Generate README
        env:
          LLM_BASE_URL: ${{ inputs.llm_base_url }}
          LLM_MODEL: ${{ inputs.llm_model }}
          LLM_API_KEY: ${{ secrets.llm_api_key }}
        run: |
          set -euo pipefail

          CONFIG_PATH=".pai/ci/configs/readme-generation.yml"
          if [ "${{ inputs.is_lib }}" = "true" ]; then
            CONFIG_PATH=".pai/ci/configs/lib-readme-generation.yml"
          fi

          pipelineai run --config "$CONFIG_PATH" --artifact-dir .agent/artifacts --parallel 1

          if git diff --quiet -- README.md; then
            echo "README.md unchanged."
            echo "README_CHANGED=false" >> "$GITHUB_OUTPUT"
          else
            echo "README.md changed."
            echo "README_CHANGED=true" >> "$GITHUB_OUTPUT"
          fi
        id: gen

      - name: Create PR
        if: ${{ inputs.create_pr && steps.gen.outputs.README_CHANGED == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ inputs.pr_branch }}
          delete-branch: true
          commit-message: ${{ inputs.pr_title }}
          title: ${{ inputs.pr_title }}
          body: ${{ inputs.pr_body }}
          add-paths: |
            README.md

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pai-docs-artifacts
          path: .agent/artifacts
